[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Single-page app fallback so deep links always serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Long cache for fingerprinted build assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
